<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İmdetek Teknoloji | Alarko Carrier Yetkili Bayi</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #020b18; --gold: #c49b6d; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--navy); color: var(--white); overflow-x: hidden; }

        /* NAVBAR */
        nav { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            background: rgba(2, 11, 24, 0.95); padding: 20px 8%; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(196, 155, 109, 0.3);
        }
        .logo { font-weight: 700; font-size: 20px; color: #fff; text-decoration: none; }
        .logo span { color: var(--gold); }

        /* SLIDER SECTION */
        .hero { height: 100vh; position: relative; overflow: hidden; display: flex; align-items: center; padding: 0 8%; }
        .slide { 
            position: absolute; inset: 0; opacity: 0; transition: 1s; 
            background-size: cover; background-position: center; 
        }
        .slide.active { opacity: 1; }
        .slide::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
        
        .hero-content { position: relative; z-index: 10; max-width: 800px; }
        .hero h1 { font-size: clamp(35px, 6vw, 70px); margin-bottom: 20px; }
        .hero h1 span { color: var(--gold); }
        .btn { 
            display: inline-block; background: var(--gold); color: #000; 
            padding: 15px 35px; border-radius: 5px; text-decoration: none; 
            font-weight: 700; margin-top: 20px; 
        }

        /* CHATBOT */
        #chat-win {
            position: fixed; bottom: 100px; right: 30px; width: 320px; height: 400px;
            background: #0a1424; border: 1px solid var(--gold); border-radius: 15px;
            display: none; flex-direction: column; z-index: 2000; overflow: hidden;
        }
        #chat-win.open { display: flex; }
        .chat-header { background: var(--gold); padding: 15px; color: #000; font-weight: 700; display: flex; justify-content: space-between; }
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; }
        .chat-input { padding: 10px; border-top: 1px solid #1a2a44; display: flex; }
        .chat-input input { flex: 1; background: transparent; border: none; color: #fff; outline: none; }

        /* FLOATING BUTTONS */
        .float-btn {
            position: fixed; bottom: 30px; right: 30px; z-index: 2001;
            width: 60px; height: 60px; background: var(--gold); border-radius: 15px;
            border: none; cursor: pointer; font-size: 25px;
        }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">İMDETEK <span>TEKNOLOJİ</span></a>
    <div style="font-size: 11px; font-weight: 700; color: var(--gold);">ALARKO YETKİLİ BAYİ</div>
</nav>

<div class="hero">
    <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1581094288338-2314dddb7ecc?q=80&w=1600');"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1631548231167-9aa923fe9991?q=80&w=1600');"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1585129049162-71c2604fbb89?q=80&w=1600');"></div>

    <div class="hero-content">
        <h1>Alarko Carrier <span>Konforu</span></h1>
        <p>Bursa'nın her yerine Alarko yetkili bayi güvencesiyle servis ve kurulum sağlıyoruz.</p>
        <a href="tel:05075589208" class="btn">HEMEN ARA</a>
    </div>
</div>

<button class="float-btn" onclick="toggleChat()">🤖</button>

<div id="chat-win">
    <div class="chat-header">İmdetek Asistan <span onclick="toggleChat()" style="cursor:pointer">X</span></div>
    <div class="chat-body" id="msgs">Merhaba! Alarko ürünleri, adresimiz veya çalışma saatlerimiz hakkında bilgi alabilirsiniz.</div>
    <div class="chat-input">
        <input type="text" id="chatIn" placeholder="Sorunuzu yazın..." onkeypress="if(event.key==='Enter') sendChat()">
        <button onclick="sendChat()" style="background:none; border:none; color:var(--gold); font-weight:700; cursor:pointer; padding-left:10px;">></button>
    </div>
</div>

    let cur = 0;
    const slides = document.querySelectorAll('.slide');
    setInterval(() => {
        slides[cur].classList.remove('active');
        cur = (cur + 1) % slides.length;
        slides[cur].classList.add('active');
    }, 4000);
