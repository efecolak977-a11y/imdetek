<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İmdetek Teknoloji | Alarko Carrier Yetkili Bayi</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --alarko-navy: #020b18;
            --alarko-gold: #c49b6d;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(196, 155, 109, 0.25);
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-family: 'Montserrat', sans-serif; background: var(--alarko-navy); color: var(--white); overflow-x: hidden; }

        /* PRESTİJLİ NAVİGASYON */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 20px 8%; background: rgba(2, 11, 24, 0.9);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo-area { display: flex; align-items: center; gap: 15px; text-decoration: none; color: #fff; }
        .logo-sq { width: 45px; height: 45px; background: var(--alarko-gold); border-radius: 5px; color: #000; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 22px; }
        .nav-links a { color: #fff; text-decoration: none; margin-left: 30px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .nav-links a:hover { color: var(--alarko-gold); }

        /* REKLAM SLIDER (HERO) */
        .hero-slider { height: 100vh; position: relative; overflow: hidden; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: 1.5s ease-in-out; background-size: cover; background-position: center; display: flex; align-items: center; padding: 0 8%; }
        .slide.active { opacity: 1; }
        .slide::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, var(--alarko-navy) 30%, transparent 100%); }
        
        .hero-content { position: relative; z-index: 10; max-width: 850px; transform: translateY(30px); transition: 1s; opacity: 0; }
        .slide.active .hero-content { transform: translateY(0); opacity: 1; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(45px, 6vw, 90px); line-height: 1.1; margin-bottom: 25px; }
